name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Test all Python microservices in parallel
  # ─────────────────────────────────────────────────────────────────────────────
  test-user-service:
    name: Test · User Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/user_service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r ../requirements.txt
      - run: pytest test_user.py -v

  test-catalog-service:
    name: Test · Catalog Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/catalog_service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r ../requirements.txt
      - run: pytest test_catalog.py -v

  test-booking-service:
    name: Test · Booking Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/booking_service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r ../requirements.txt
      - run: pytest test_booking.py -v

  test-notification-service:
    name: Test · Notification Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/notification_service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r ../requirements.txt
      - run: pytest test_notification.py -v

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Lint & type-check the Next.js frontend
  # ─────────────────────────────────────────────────────────────────────────────
  test-frontend:
    name: Test · Frontend (Next.js build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy to Render (backend) + Vercel (frontend)
  #          Only runs on push to main after ALL tests pass
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - test-user-service
      - test-catalog-service
      - test-booking-service
      - test-notification-service
      - test-frontend

    steps:
      - uses: actions/checkout@v4

      # ── Deploy backend services to Render via API ─────────────────────────
      - name: Deploy all backend services → Render
        run: |
          for SERVICE_ID in srv-d8kr8sf7f7vs7395k3lg srv-d8kr8sf7f7vs7395k3l0 srv-d8krcpv7f7vs7395mvl0 srv-d8kr8sf7f7vs7395k3m0 srv-d8krfn77f7vs7395oojg; do
            curl -s -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d '{"clearCache": "do_not_clear"}' | jq .id
          done

      # ── Deploy frontend to Vercel ──────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g vercel@latest
      - name: Deploy Frontend → Vercel
        run: vercel --prod --yes --token "${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
